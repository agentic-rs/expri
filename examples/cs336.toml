[project]
name = "cs336-assignment5-alignment"

[sync]
exclude_dirs = [
  ".git",
  ".venv",
  "__pycache__",
  ".pytest_cache",
  ".mypy_cache",
  ".ruff_cache",
  ".pyre",
  ".hypothesis",
  "alignment.egg-info",
  "out",
]

exclude_files = [
  ".env",
  "*.pyc",
  "*.pyo",
  "*.log",
  "*.tmp",
  ".DS_Store",
]

include_ignored = [
  "wandb/config.json",
  "wandb/.gitignore",
]

remote_managed = [
  "uv.lock",
]

[tasks]
train = { command = ["python", "scripts/train.py"], uv = true }

[download]
ignore = ["*.pt"]

[download.mappings]
wandb = "wandb"
jobs = "out/jobs"

[[setup.steps]]
kind = "uv"
extras = ["plots"]
